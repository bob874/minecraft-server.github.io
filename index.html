<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - The Hyenas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', Arial, sans-serif;
}

body {
    background: #0d0d0d;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #1a1a1a;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    border: 1px solid #333;
    text-align: center;
}

h1 {
    color: #bb00ff;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    background: #111;
    color: white;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: purple;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #bb00ff;
}

a {
    color: #bb00ff;
    display: block;
    margin-top: 15px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

    <h1>Login</h1>

    <input type="email" id="email" placeholder="Email" autocomplete="off">
    <input type="password" id="password" placeholder="Password" autocomplete="off">

    <button type="button" onclick="login()">Login</button>

    <a href="register.html">Don't have an account? Register</a>

</div>

<script src="app.js"></script>

<script>
/* DEBUG HELPER (REMOVE LATER IF YOU WANT) */
console.log("Login page loaded");
</script>

</body>
</html>
