<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - The Hyenas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', Arial, sans-serif;
}

body {
    background: #0d0d0d;
    color: white;
    padding: 25px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.logo {
    font-size: 26px;
    color: #bb00ff;
    font-weight: bold;
}

.btn {
    padding: 10px 15px;
    background: purple;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.btn:hover {
    background: #bb00ff;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

/* CARDS */
.card {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 15px;
}

.card h3 {
    color: #bb00ff;
    margin-bottom: 10px;
}

/* AVATAR */
.avatar {
    font-size: 60px;
    text-align: center;
}
</style>
</head>

<body onload="loadDashboard(); loadServerStatus();">

<!-- HEADER -->
<div class="header">
    <div class="logo">The Hyenas Dashboard</div>
    <button class="btn" onclick="logout()">Logout</button>
</div>

<!-- GRID -->
<div class="grid">

    <div class="card">
        <h3>User</h3>
        <p id="user">Loading...</p>
    </div>

    <div class="card">
        <h3>Balance</h3>
        <p>£<span id="money">0</span></p>
    </div>

    <div class="card">
        <h3>Season</h3>
        <p id="season">1</p>
    </div>

    <div class="card">
        <h3>Rank</h3>
        <p id="rank">Rookie</p>
    </div>

    <div class="card">
        <h3>Minecraft Server</h3>
        <p id="server-status">Checking...</p>
    </div>

    <div class="card">
        <h3>Reward</h3>
        <button class="btn" onclick="joinReward()">+£500 Join Bonus</button>
    </div>

    <div class="card">
        <h3>Shop</h3>
        <button class="btn" onclick="buyPlan(5000)">Buy Standard (£5,000)</button>
        <button class="btn" onclick="buyPlan(12000)">Buy Pro (£12,000)</button>
    </div>

    <div class="card">
        <h3>SAPS Avatar</h3>
        <div id="avatar-box" class="avatar">🧍</div>
    </div>

</div>

<!-- APP JS -->
<script src="app.js"></script>

</body>
</html>
