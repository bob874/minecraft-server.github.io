<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - The Hyenas</title>

<link rel="stylesheet" href="style.css">

<style>
.box {
    background: #1a1a1a;
    border: 1px solid #333;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    margin: 100px auto;
    text-align: center;
}

h1 { color: #bb00ff; }

.btn {
    margin-top: 15px;
    width: 100%;
}
</style>
</head>

<body>

<div class="box">

    <h1>Checkout</h1>

    <p>Plan: <span id="plan"></span></p>
    <p>Price: £<span id="price"></span>/month</p>

    <button class="btn" onclick="confirmPurchase()">Confirm Purchase</button>

</div>

<script>
/* GET URL DATA */
const params = new URLSearchParams(window.location.search);
const plan = params.get("plan");
const price = Number(params.get("price"));

document.getElementById("plan").innerText = plan;
document.getElementById("price").innerText = price;

/* CONFIRM PURCHASE */
function confirmPurchase() {
    let user = JSON.parse(localStorage.getItem("currentUser"));

    if (!user) {
        alert("You must login first!");
        window.location.href = "login.html";
        return;
    }

    if (user.balance < price * 1000) {
        alert("Not enough balance!");
        return;
    }

    user.balance -= price * 1000;

    localStorage.setItem("currentUser", JSON.stringify(user));

    alert("Purchase successful!");
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
