<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Season - The Hyenas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', Arial, sans-serif;
}

body {
    background: #0d0d0d;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.box {
    background: #1a1a1a;
    padding: 35px;
    border-radius: 12px;
    width: 360px;
    text-align: center;
    border: 1px solid #333;
}

h1 {
    color: #bb00ff;
    margin-bottom: 15px;
}

p {
    color: #ccc;
    margin-bottom: 10px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: purple;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #bb00ff;
}

/* WARNING */
.warning {
    color: orange;
    font-size: 13px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">

    <h1>Season System</h1>

    <p>Current Season: <span id="season">Loading...</span></p>

    <p>Reset your progress and start a new economy season.</p>

    <button onclick="newSeason()">Start New Season</button>

    <p class="warning">
        ⚠ This will reset all balances to £10,000
    </p>

</div>

<script src="app.js"></script>

<script>
/* load season */
let user = JSON.parse(localStorage.getItem("currentUser"));

if (user) {
    document.getElementById("season").innerText = user.season;
} else {
    document.getElementById("season").innerText = "Not logged in";
}
</script>

</body>
</html>
